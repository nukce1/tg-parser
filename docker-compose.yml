services:
  web:
    build: .
    container_name: tg-scraper-web
    restart: unless-stopped
    ports:
      - "37773:8989"
    environment:
      - TG_SCRAPER_ACCOUNTS_PATH=/data/accounts.db
    volumes:
      - ./accounts.db:/data/accounts.db:ro

  collector:
    build: .
    container_name: tg-scraper-collector
    profiles: ["tools"]
    entrypoint: ["./collector-entrypoint.sh"]
    volumes:
      - ./.env:/app/.env
      - ./tg_finder_1.session:/app/tg_finder_1.session
      - ./accounts.db:/app/accounts.db
      - ./logs:/app/logs